  </g>
  
  <!-- Connection lines -->
  <g stroke="#FFA000" stroke-width="1">
    <line x1="25" y1="25" x2="55" y2="55" />
    <line x1="35" y1="27" x2="45" y2="53" />
    <line x1="45" y1="27" x2="35" y2="53" />
    <line x1="55" y1="25" x2="25" y2="55" />
  </g>
  
  <!-- Text -->
  <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32">
    AfriGen-D
  </text>
  <text x="90" y="48" font-family="Arial, sans-serif" font-size="12" fill="#666">
    Enabling innovation in
